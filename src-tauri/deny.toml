# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Advisories below are inherited through upstream dependency chains. Keep this
# list narrow so stale ignores surface during local and CI checks.
#
# GTK3 bindings (RUSTSEC-2024-04xx): Required by Tauri for Linux via wry/tao/gtk.
# Cannot be replaced until Tauri migrates to GTK4.
#
# proc-macro-error (RUSTSEC-2024-0370): Used by several proc-macro derive crates.
# No drop-in replacement available yet.
#
# unic-* crates (RUSTSEC-2025-0xxx): Unicode crates from open-i18n, inherited
# through Tauri's urlpattern crate. No replacement available.
ignore = [
    # --- GTK3 bindings (unmaintained, required by Tauri on Linux) ---
    "RUSTSEC-2024-0411",  # gdkwayland-sys
    "RUSTSEC-2024-0412",  # gdk
    "RUSTSEC-2024-0413",  # atk
    "RUSTSEC-2024-0414",  # gdkx11-sys
    "RUSTSEC-2024-0415",  # gtk
    "RUSTSEC-2024-0416",  # atk-sys
    "RUSTSEC-2024-0417",  # gdkx11
    "RUSTSEC-2024-0418",  # gdk-sys
    "RUSTSEC-2024-0419",  # gtk3-macros
    "RUSTSEC-2024-0420",  # gtk-sys

    # --- proc-macro-error (unmaintained) ---
    "RUSTSEC-2024-0370",  # proc-macro-error

    # --- unic-* Unicode crates (unmaintained, via Tauri urlpattern) ---
    "RUSTSEC-2025-0075",  # unic-char-range
    "RUSTSEC-2025-0080",  # unic-common
    "RUSTSEC-2025-0081",  # unic-char-property
    "RUSTSEC-2025-0098",  # unic-ucd-version
    "RUSTSEC-2025-0100",  # unic-ucd-ident
]
