manifest_version = 1

[defaults]
embedding = "qwen3-embedding-0.6b"
reranker = "qwen3-reranker-0.6b"
legacy_runtime_embedding = "all-minilm-l6-v2-baseline"

[instruction_profiles.resume_requirement_v1]
query = "Given a job requirement, retrieve resume passages that provide concrete evidence that the candidate satisfies the requirement."
document = "Resume passage or professional profile evidence."

[instruction_profiles.job_search_v1]
query = "Given a candidate profile, retrieve jobs that match concrete skills, seniority, role intent, location, and domain evidence."
document = "Job posting, job summary, or role requirement."

[thresholds.resume_requirement]
strong = 0.82
medium = 0.65
weak = 0.48
retrieval = 0.30

[thresholds.job_search]
strong = 0.76
medium = 0.60
weak = 0.42
retrieval = 0.42

[reranker_acceptance]
resume_requirement = 3.0

[[models]]
