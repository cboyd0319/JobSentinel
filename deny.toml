# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Advisories below are inherited through upstream dependency chains. Keep this
# list narrow so stale ignores surface during local and CI checks.
#
# GTK3 bindings (RUSTSEC-2024-04xx): Required by Tauri for Linux via wry/tao/gtk.
# Cannot be replaced until Tauri migrates to GTK4.
#
# proc-macro-error (RUSTSEC-2024-0370): Used by several proc-macro derive crates.
# No drop-in replacement available yet.
#
# unic-* crates (RUSTSEC-2025-0xxx): Unicode crates from open-i18n, inherited
# through Tauri's urlpattern crate. No replacement available.
#
# quick-xml (RUSTSEC-2026-0194 and RUSTSEC-2026-0195): The only version below
# 0.41 is inherited through the current Windows notification backend. That
# backend calls quick-xml only to escape locally constructed toast text; it does
# not parse XML or use the affected attribute or namespace reader APIs.
# JobSentinel's RSS, resume, and Tauri plist parsing paths use quick-xml 0.41.
#
# ttf-parser (RUSTSEC-2026-0192): Inherited through pdf-extract and lopdf for
# local resume parsing. This is an unmaintained notice without a reported
# vulnerability. pdf-extract has no maintained replacement for that edge yet.
ignore = [
    # --- GTK3 bindings (unmaintained, required by Tauri on Linux) ---
    "RUSTSEC-2024-0411",  # gdkwayland-sys
    "RUSTSEC-2024-0412",  # gdk
    "RUSTSEC-2024-0413",  # atk
    "RUSTSEC-2024-0414",  # gdkx11-sys
    "RUSTSEC-2024-0415",  # gtk
    "RUSTSEC-2024-0416",  # atk-sys
    "RUSTSEC-2024-0417",  # gdkx11
    "RUSTSEC-2024-0418",  # gdk-sys
    "RUSTSEC-2024-0419",  # gtk3-macros
    "RUSTSEC-2024-0420",  # gtk-sys

    # --- proc-macro-error (unmaintained) ---
    "RUSTSEC-2024-0370",  # proc-macro-error

    # --- unic-* Unicode crates (unmaintained, via Tauri urlpattern) ---
    "RUSTSEC-2025-0075",  # unic-char-range
    "RUSTSEC-2025-0080",  # unic-common
    "RUSTSEC-2025-0081",  # unic-char-property
    "RUSTSEC-2025-0098",  # unic-ucd-version
    "RUSTSEC-2025-0100",  # unic-ucd-ident

    # --- Constrained upstream parsing dependencies ---
    "RUSTSEC-2026-0192",  # ttf-parser, unmaintained through pdf-extract
    "RUSTSEC-2026-0194",  # quick-xml, unreachable parser path in Windows notifications
    "RUSTSEC-2026-0195",  # quick-xml, unreachable namespace path in Windows notifications
]

[licenses]
# Keep license review explicit for the current dependency graph. These are
# permissive/copyleft-compatible licenses observed in the locked crates.
confidence-threshold = 0.93
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LGPL-2.1-or-later",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[bans]
multiple-versions = "allow"
wildcards = "deny"
deny = [
    { crate = "curl", reason = "Use reqwest with rustls for HTTP clients" },
    { crate = "git2", reason = "Do not introduce libgit2/native SSH supply-chain surface" },
    { crate = "libssh2-sys", reason = "Do not introduce native SSH dependency surface" },
    { crate = "native-tls", reason = "Use rustls-backed TLS paths" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
