name: Release build linux

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      version:
        required: true
        type: string

permissions: {}

env:
  CARGO_INCREMENTAL: "0"
  SQLX_OFFLINE: true

jobs:
  build-release-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    environment:
      name: release
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/harness/npm-pin.mjs

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.97.0"
          targets: x86_64-unknown-linux-gnu

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev=2.52.3-0ubuntu0.24.04.1 \
            libgtk-3-dev=3.24.41-4ubuntu1.3 \
            libgtk-3-bin=3.24.41-4ubuntu1.3 \
            libappindicator3-dev=12.10.1+20.10.20200706.1-0ubuntu5 \
            librsvg2-dev=2.58.0+dfsg-1build1 \
            libfuse2t64=2.9.9-8.1build1 \
            patchelf=0.18.0-1.1build1 \
            squashfs-tools=1:4.6.1-1build1

      - name: Build Linux Tauri app
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: node scripts/platform/build-linux-appimage.mjs --target x86_64-unknown-linux-gnu

      - name: Verify Linux packages and checksums
        shell: bash
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          appimages=(target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage)
          debs=(target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb)

          if [ "${#appimages[@]}" -ne 1 ]; then
            printf 'Expected exactly one Linux AppImage before release upload; found %s\n' "${#appimages[@]}"
            exit 1
          fi
          if [ "${#debs[@]}" -ne 1 ]; then
            printf 'Expected exactly one Linux deb before release upload; found %s\n' "${#debs[@]}"
            exit 1
          fi

          for asset in "${appimages[0]}" "${debs[0]}"; do
            if [ ! -s "$asset" ]; then
              printf 'Linux asset is empty: %s\n' "$asset"
              exit 1
            fi
            if [[ "$(basename "$asset")" != *"$EXPECTED_VERSION"* ]]; then
              printf 'Linux asset filename does not include release version %s: %s\n' "$EXPECTED_VERSION" "$asset"
              exit 1
            fi
            sha256sum "$asset" > "$asset.sha256"
            cat "$asset.sha256"
          done

          file "${appimages[0]}"
          dpkg-deb --info "${debs[0]}" >/dev/null
          dpkg-deb --contents "${debs[0]}" >/dev/null

      - name: Remove old Linux release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            printf 'Deleting stale Linux release asset: %s\n' "$asset"
            gh release delete-asset "$RELEASE_TAG" "$asset" -y
          done < <(
            gh release view "$RELEASE_TAG" \
              --json assets \
              --jq '.assets[].name' \
              | grep -E '\.(AppImage|deb)(\.sha256)?$' || true
          )

      - name: Stage Linux release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets/public
          cp target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage release-assets/public/
          cp target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sha256 release-assets/public/
          cp target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb release-assets/public/
          cp target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb.sha256 release-assets/public/

      - name: Generate release SBOM
        shell: bash
        env:
          PLATFORM_KEY: linux
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          npm run release:sbom -- \
            --platform "$PLATFORM_KEY" \
            --version "$RELEASE_VERSION" \
            --out-dir release-assets/public \
            --checksums-out release-assets/attestation-subjects.sha256 \
            --require-artifacts

      - name: Attest release artifact provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: release-assets/public/*

      - name: Attest release artifact SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            release-assets/public/*.dmg
            release-assets/public/*.msi
            release-assets/public/*.exe
            release-assets/public/*.AppImage
            release-assets/public/*.deb
          sbom-path: release-assets/public/JobSentinel-${{ inputs.version }}-linux.sbom.spdx.json

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-assets/public/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            printf 'No release assets were staged for upload.\n'
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
