name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: "17 11 * * 1"
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      harness: ${{ steps.filter.outputs.harness }}
      rust: ${{ steps.filter.outputs.rust }}
      security: ${{ steps.filter.outputs.security }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify changed files
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event_name != 'pull_request' && github.event.before || '' }}
          PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
        run: |
          set -euo pipefail

          event="${EVENT_NAME:-}"
          zero="0000000000000000000000000000000000000000"

          if [ "$event" = "workflow_dispatch" ]; then
            git ls-files > changed-files.txt
          elif [ "$event" = "schedule" ]; then
            printf '%s\n' \
              .github/dependabot.yml \
              .github/workflows/ci.yml \
              package.json \
              package-lock.json \
              src-tauri/Cargo.lock \
              src-tauri/Cargo.toml \
              src-tauri/deny.toml \
              > changed-files.txt
          elif [ "$event" = "pull_request" ]; then
            git diff --name-only "$PR_BASE_SHA" "$GITHUB_SHA" > changed-files.txt
          elif [ "${EVENT_BEFORE:-}" = "$zero" ]; then
            git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" > changed-files.txt
          else
            git diff --name-only "$EVENT_BEFORE" "$GITHUB_SHA" > changed-files.txt
          fi

          sort -u changed-files.txt -o changed-files.txt
          printf 'Changed files:\n'
          sed 's/^/- /' changed-files.txt

          frontend=false
          harness=false
          rust=false
          security=false

          while IFS= read -r path; do
            [ -n "$path" ] || continue

            case "$path" in
              AGENTS.md|CLAUDE.md|README.md|PRIVACY.md|RESPONSIBLE_AI.md|ROADMAP.md|CHANGELOG.md|CONTRIBUTING.md|docs/*|scripts/*|package.json|package-lock.json|.github/PULL_REQUEST_TEMPLATE.md|.github/copilot-instructions.md|.github/workflows/*|.markdownlint.json)
                harness=true
                ;;
            esac

            case "$path" in
              src/*|tests/*|browser-extension/*|public/*|index.html|package.json|package-lock.json|tsconfig*.json|vite.config.*|vitest.config.*|eslint.config.*|tailwind.config.*|postcss.config.*)
                frontend=true
                ;;
            esac

            case "$path" in
              Cargo.toml|Cargo.lock|.cargo/*|clippy.toml|deny.toml|crates/*|src-tauri/*|rust-toolchain.toml|resources/*)
                rust=true
                ;;
            esac

            case "$path" in
              AGENTS.md|CLAUDE.md|docs/CLAUDE.md|CODEX.md|GEMINI.md|.cursorrules|.windsurfrules|.cursor/rules/*|.github/copilot-instructions.md|.github/instructions/*.instructions.md|package.json|package-lock.json|Cargo.toml|Cargo.lock|deny.toml|crates/*/Cargo.toml|src-tauri/Cargo.toml|src-tauri/Cargo.lock|src-tauri/deny.toml|.github/dependabot.yml|.github/workflows/*)
                security=true
                ;;
            esac
          done < changed-files.txt

          if [ "$event" = "workflow_dispatch" ]; then
            frontend=true
            harness=true
            rust=true
            security=true
          elif [ "$event" = "schedule" ]; then
            frontend=false
            harness=true
            rust=false
            security=true
          fi

          {
            printf 'frontend=%s\n' "$frontend"
            printf 'harness=%s\n' "$harness"
            printf 'rust=%s\n' "$rust"
            printf 'security=%s\n' "$security"
          } >> "$GITHUB_OUTPUT"

  harness:
    needs: changes
    if: needs.changes.outputs.harness == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.security == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: "npm"

      - name: Install pinned npm
        run: node scripts/install-pinned-npm.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Run harness checks
        run: npm run harness:check

      - name: Check dependency pins
        run: npm run lint:deps

      - name: Check GitHub Actions pins
        run: npm run lint:actions

      - name: Run harness script tests
        run: npm run test:scripts

      - name: Run markdown lint
        if: needs.changes.outputs.harness == 'true'
        run: npm run lint:md

  test-rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96.0"
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev=2.52.3-0ubuntu0.24.04.1 \
            libgtk-3-dev=3.24.41-4ubuntu1.3 \
            libgtk-3-bin=3.24.41-4ubuntu1.3 \
            libappindicator3-dev=12.10.1+20.10.20200706.1-0ubuntu5 \
            librsvg2-dev=2.58.0+dfsg-1build1

      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: src-tauri
        run: cargo test --lib

  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: "npm"

      - name: Install pinned npm
        run: node scripts/install-pinned-npm.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Run TypeScript check
        run: npx --no-install tsc --noEmit

      - name: Run ESLint
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --run

  security-node:
    needs: changes
    if: needs.changes.outputs.security == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: "npm"

      - name: Install pinned npm
        run: node scripts/install-pinned-npm.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Run security sensors
        run: npm run lint:security

      - name: Run GitHub Actions static analysis
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          inputs: .github/workflows

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: Check latest stable dependency and action pins
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npm run release:check-deps

  security-rust:
    needs: changes
    if: needs.changes.outputs.security == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96.0"

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.9 --locked

      - name: cargo deny supply-chain policy
        working-directory: src-tauri
        run: cargo deny check advisories bans licenses sources
