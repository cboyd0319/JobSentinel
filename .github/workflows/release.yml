name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag, for example 2.9.0 or v2.9.0"
        required: true
        type: string
      platform:
        description: "Platform assets to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
  push:
    tags:
      - "v*"

permissions: {}

env:
  CARGO_INCREMENTAL: "0"
  SQLX_OFFLINE: true

jobs:
  release-inputs:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release_inputs.outputs.version }}
      tag: ${{ steps.release_inputs.outputs.tag }}
      matrix: ${{ steps.release_inputs.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.17.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/install-pinned-npm.mjs

      - name: Resolve release inputs
        id: release_inputs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PLATFORM: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'all' }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          set -euo pipefail
          event="${EVENT_NAME:-}"

          if [ -n "$INPUT_VERSION" ]; then
            version="${INPUT_VERSION#v}"
          else
            version="${GITHUB_REF#refs/tags/v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'Release version must be an exact stable semver (x.y.z), found: %s\n' "$version"
            exit 1
          fi

          expected_ref="refs/tags/v${version}"
          if [ "${GITHUB_REF:-}" != "$expected_ref" ]; then
            if [ "$event" = "workflow_dispatch" ]; then
              printf 'Manual release dispatch must run from %s. Select the existing release tag as the workflow ref. Found: %s\n' "$expected_ref" "${GITHUB_REF:-<unset>}"
            else
              printf 'Release workflow must run from %s. Found: %s\n' "$expected_ref" "${GITHUB_REF:-<unset>}"
            fi
            exit 1
          fi

          case "$INPUT_PLATFORM" in
            all)
              matrix='[{"platform_key":"windows","platform":"windows-2025","target":"x86_64-pc-windows-msvc","asset_name_prefix":"JobSentinel-Windows"},{"platform_key":"macos","platform":"macos-26","target":"universal-apple-darwin","asset_name_prefix":"JobSentinel-macOS"},{"platform_key":"linux","platform":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","asset_name_prefix":"JobSentinel-Linux"}]'
              ;;
            windows)
              matrix='[{"platform_key":"windows","platform":"windows-2025","target":"x86_64-pc-windows-msvc","asset_name_prefix":"JobSentinel-Windows"}]'
              ;;
            macos)
              matrix='[{"platform_key":"macos","platform":"macos-26","target":"universal-apple-darwin","asset_name_prefix":"JobSentinel-macOS"}]'
              ;;
            linux)
              matrix='[{"platform_key":"linux","platform":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","asset_name_prefix":"JobSentinel-Linux"}]'
              ;;
            *)
              printf 'Unsupported release platform: %s\n' "$INPUT_PLATFORM"
              exit 1
              ;;
          esac

          {
            printf 'version=%s\n' "$version"
            printf 'tag=v%s\n' "$version"
            printf 'matrix=%s\n' "$matrix"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ steps.release_inputs.outputs.version }}
        run: npm run release:check-version -- "$RELEASE_VERSION"

  preflight-harness:
    needs: release-inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 18
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.17.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/install-pinned-npm.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Run harness checks
        run: npm run harness:check

      - name: Check latest stable dependency pins
        run: npm run release:check-deps

      - name: Run harness script tests
        run: npm run test:scripts

      - name: Run markdown lint
        run: npm run lint:md

  preflight-frontend:
    needs: release-inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.17.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/install-pinned-npm.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend unit tests
        run: npm test -- --run

      - name: Run frontend build
        run: npm run build

  preflight-rust:
    needs: release-inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96.0"
          components: clippy, rustfmt

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            file=1:5.45-3build1 \
            libwebkit2gtk-4.1-dev=2.52.3-0ubuntu0.24.04.1 \
            libgtk-3-dev=3.24.41-4ubuntu1.3 \
            libgtk-3-bin=3.24.41-4ubuntu1.3 \
            libappindicator3-dev=12.10.1+20.10.20200706.1-0ubuntu5 \
            librsvg2-dev=2.58.0+dfsg-1build1

      - name: Run Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --lib

  preflight-security:
    needs: release-inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.17.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/install-pinned-npm.mjs

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96.0"

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.9 --locked

      - name: cargo deny supply-chain policy
        working-directory: src-tauri
        run: cargo deny check advisories bans licenses sources

  create-release:
    needs:
      - release-inputs
      - preflight-harness
      - preflight-frontend
      - preflight-rust
      - preflight-security
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment:
      name: release
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release_inputs.outputs.version }}
      tag: ${{ steps.release_inputs.outputs.tag }}
      matrix: ${{ steps.release_inputs.outputs.matrix }}
    steps:
      - name: Publish release inputs
        id: release_inputs
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.release-inputs.outputs.version }}
          RELEASE_TAG: ${{ needs.release-inputs.outputs.tag }}
          RELEASE_MATRIX: ${{ needs.release-inputs.outputs.matrix }}
        run: |
          set -euo pipefail
          {
            printf 'version=%s\n' "$RELEASE_VERSION"
            printf 'tag=%s\n' "$RELEASE_TAG"
            printf 'matrix=%s\n' "$RELEASE_MATRIX"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_inputs.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release_inputs.outputs.version }}
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          cat > "$notes_file" <<'EOF'
          macOS package status is enforced by the release workflow.

          In no-Apple-Developer-account mode, the macOS DMG is ad-hoc signed, not Developer ID signed, not notarized, and not Gatekeeper-ready. It requires a first-open Privacy & Security approval on macOS. Verify the matching `.sha256` checksum before opening.

          When Developer ID signing and notarization are configured, the macOS workflow requires Gatekeeper acceptance before upload.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "JobSentinel $RELEASE_VERSION" \
              --draft \
              --prerelease=false \
              --notes-file "$notes_file"
          else
            gh release create "$RELEASE_TAG" \
              --title "JobSentinel $RELEASE_VERSION" \
              --draft \
              --notes-file "$notes_file"
          fi

  build-release:
    needs: create-release
    environment:
      name: release
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.create-release.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev=2.52.3-0ubuntu0.24.04.1 \
            libgtk-3-dev=3.24.41-4ubuntu1.3 \
            libgtk-3-bin=3.24.41-4ubuntu1.3 \
            libappindicator3-dev=12.10.1+20.10.20200706.1-0ubuntu5 \
            librsvg2-dev=2.58.0+dfsg-1build1 \
            libfuse2t64=2.9.9-8.1build1 \
            patchelf=0.18.0-1.1build1 \
            squashfs-tools=1:4.6.1-1build1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.17.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/install-pinned-npm.mjs

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Configure Windows signing
        if: matrix.platform == 'windows-2025'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
          WINDOWS_TSP: ${{ secrets.WINDOWS_TSP }}
        run: |
          $ErrorActionPreference = "Stop"

          $required = @(
            "WINDOWS_CERTIFICATE",
            "WINDOWS_CERTIFICATE_PASSWORD",
            "WINDOWS_CERTIFICATE_THUMBPRINT",
            "WINDOWS_TIMESTAMP_URL"
          )
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            throw "Windows release signing secrets are required before public MSI upload. Missing: $($missing -join ', ')."
          }

          $thumbprint = ($env:WINDOWS_CERTIFICATE_THUMBPRINT -replace "\s", "").ToUpperInvariant()
          if ($thumbprint -notmatch "^[A-F0-9]{40}$") {
            throw "WINDOWS_CERTIFICATE_THUMBPRINT must be a 40-character SHA-1 certificate thumbprint."
          }

          if ($env:WINDOWS_TIMESTAMP_URL -notmatch "^https?://") {
            throw "WINDOWS_TIMESTAMP_URL must be an HTTP(S) timestamp service URL from the certificate provider."
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "jobsentinel-windows-signing.pfx"
          $certificateBytes = [Convert]::FromBase64String(($env:WINDOWS_CERTIFICATE -replace "\s", ""))
          [IO.File]::WriteAllBytes($certificatePath, $certificateBytes)

          try {
            Import-PfxCertificate `
              -FilePath $certificatePath `
              -CertStoreLocation Cert:\CurrentUser\My `
              -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText) `
              | Out-Null
          } finally {
            Remove-Item -LiteralPath $certificatePath -Force -ErrorAction SilentlyContinue
          }

          $windowsConfig = [ordered]@{
            bundle = [ordered]@{
              windows = [ordered]@{
                certificateThumbprint = $thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = $env:WINDOWS_TIMESTAMP_URL
                tsp = $env:WINDOWS_TSP -eq "true"
              }
            }
          }

          $windowsConfig |
            ConvertTo-Json -Depth 5 |
            Set-Content -Path "src-tauri/tauri.windows.conf.json" -Encoding utf8NoBOM

      - name: Configure macOS signing and notarization
        if: matrix.platform == 'macos-26'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          JOBSENTINEL_MACOS_NOTARY_PROFILE: ${{ secrets.JOBSENTINEL_MACOS_NOTARY_PROFILE }}
          NOTARYTOOL_KEYCHAIN_PROFILE: ${{ secrets.NOTARYTOOL_KEYCHAIN_PROFILE }}
        run: |
          set -euo pipefail

          signing_required=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_SIGNING_IDENTITY
          )
          signing_missing=()
          for name in "${signing_required[@]}"; do
            if [ -z "${!name:-}" ]; then
              signing_missing+=("$name")
            fi
          done

          apple_id_notary=false
          api_key_notary=false
          profile_notary=false
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            apple_id_notary=true
          fi
          if [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_KEY_PATH:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
            api_key_notary=true
          fi
          if [ -n "${JOBSENTINEL_MACOS_NOTARY_PROFILE:-}" ] || [ -n "${NOTARYTOOL_KEYCHAIN_PROFILE:-}" ]; then
            profile_notary=true
          fi

          notary_fields=(
            APPLE_ID
            APPLE_PASSWORD
            APPLE_TEAM_ID
            APPLE_API_KEY
            APPLE_API_KEY_PATH
            APPLE_API_ISSUER
          )
          any_notary_field=false
          for name in "${notary_fields[@]}"; do
            if [ -n "${!name:-}" ]; then
              any_notary_field=true
            fi
          done

          if [ "$profile_notary" = "true" ]; then
            printf 'GitHub macOS release runners cannot use a pre-existing notarytool keychain profile. Configure APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID or APPLE_API_KEY/APPLE_API_KEY_PATH/APPLE_API_ISSUER instead.\n'
            exit 1
          fi

          if [ "${#signing_missing[@]}" -ne 0 ]; then
            if [ "${#signing_missing[@]}" -eq "${#signing_required[@]}" ] && [ "$any_notary_field" = "false" ]; then
              printf 'Apple Developer release secrets are not configured. Building locally verified ad-hoc macOS DMG without notarization.\n'
              {
                printf 'JOBSENTINEL_MACOS_SIGNING_IDENTITY=-\n'
                printf 'JOBSENTINEL_MACOS_NOTARIZE_DMG=false\n'
                printf 'JOBSENTINEL_MACOS_REQUIRE_GATEKEEPER=false\n'
                printf 'JOBSENTINEL_MACOS_NO_ACCOUNT=true\n'
              } >> "$GITHUB_ENV"
              exit 0
            fi

            printf 'Partial macOS signing secrets are configured. Missing: %s\n' "${signing_missing[*]}"
            exit 1
          fi

          if [ "$apple_id_notary" != "true" ] && [ "$api_key_notary" != "true" ]; then
            printf 'macOS signing secrets are configured, but no complete notarization auth set is available. Configure APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID or APPLE_API_KEY/APPLE_API_KEY_PATH/APPLE_API_ISSUER.\n'
            exit 1
          fi

          keychain_password="$(openssl rand -hex 24)"
          printf '::add-mask::%s\n' "$keychain_password"
          keychain_path="$RUNNER_TEMP/jobsentinel-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/jobsentinel-certificate.p12"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

          if [ "$api_key_notary" = "true" ]; then
            materialized_api_key_path="$APPLE_API_KEY_PATH"
            if [ ! -f "$materialized_api_key_path" ]; then
              materialized_api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
              umask 077
              printf '%s' "$APPLE_API_KEY_PATH" > "$materialized_api_key_path"
              chmod 600 "$materialized_api_key_path"
            fi

            if [ ! -s "$materialized_api_key_path" ]; then
              printf 'APPLE_API_KEY_PATH must point to a readable .p8 file or contain the private key contents.\n'
              exit 1
            fi

            printf 'APPLE_API_KEY_PATH=%s\n' "$materialized_api_key_path" >> "$GITHUB_ENV"
          fi

          {
            printf 'APPLE_SIGNING_IDENTITY=%s\n' "$APPLE_SIGNING_IDENTITY"
            printf 'JOBSENTINEL_MACOS_SIGNING_IDENTITY=%s\n' "$APPLE_SIGNING_IDENTITY"
            printf 'JOBSENTINEL_MACOS_NOTARIZE_DMG=true\n'
            printf 'JOBSENTINEL_MACOS_REQUIRE_GATEKEEPER=true\n'
            printf 'JOBSENTINEL_MACOS_NO_ACCOUNT=false\n'
          } >> "$GITHUB_ENV"

      - name: Build Windows Tauri app
        if: matrix.platform == 'windows-2025'
        run: npx --no-install tauri build --target ${{ matrix.target }}

      - name: Build Linux Tauri app
        if: matrix.platform == 'ubuntu-24.04'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: node scripts/build-linux-appimage.mjs --target ${{ matrix.target }}

      - name: Clean Windows signing material
        if: always() && matrix.platform == 'windows-2025'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          $ErrorActionPreference = "Stop"

          $thumbprint = ($env:WINDOWS_CERTIFICATE_THUMBPRINT -replace "\s", "").ToUpperInvariant()
          if ($thumbprint -notmatch "^[A-F0-9]{40}$") {
            Write-Host "No valid Windows signing thumbprint was provided; skipping certificate store cleanup."
            exit 0
          }

          $matchingCertificates = @(
            Get-ChildItem -Path Cert:\CurrentUser\My |
              Where-Object { $_.Thumbprint -eq $thumbprint }
          )

          foreach ($certificate in $matchingCertificates) {
            Remove-Item -LiteralPath $certificate.PSPath -DeleteKey -Force
          }

          Remove-Item -LiteralPath "src-tauri/tauri.windows.conf.json" -Force -ErrorAction SilentlyContinue

      - name: Build macOS app and DMG
        if: matrix.platform == 'macos-26'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run tauri:build:macos -- --target ${{ matrix.target }}

      - name: Verify macOS app and DMG
        if: matrix.platform == 'macos-26'
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmg_paths=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ "${#dmg_paths[@]}" -ne 1 ]; then
            printf 'Expected exactly one macOS DMG, found %s\n' "${#dmg_paths[@]}"
            exit 1
          fi
          args=(
            --dmg "${dmg_paths[0]}"
            --expected-architectures "x86_64,arm64"
            --expected-bundle-id "com.jobsentinel.main"
            --expected-product-name "JobSentinel"
            --expected-version "$EXPECTED_VERSION"
            --expected-icon-file "icon.icns"
            --expected-minimum-system-version "13.0"
            --launch-smoke
            --install-smoke
            --require-checksum
          )

          if [ "${JOBSENTINEL_MACOS_REQUIRE_GATEKEEPER:-false}" = "true" ]; then
            args+=(--require-gatekeeper)
          fi

          npm run tauri:verify:macos -- "${args[@]}"

      - name: Clean up macOS signing material
        if: always() && matrix.platform == 'macos-26'
        shell: bash
        run: |
          set -euo pipefail

          security delete-keychain "$RUNNER_TEMP/jobsentinel-signing.keychain-db" >/dev/null 2>&1 || :
          rm -f "$RUNNER_TEMP/jobsentinel-certificate.p12"
          rm -f "$RUNNER_TEMP"/AuthKey_*.p8

      - name: Label no-account macOS DMG
        if: matrix.platform == 'macos-26' && env.JOBSENTINEL_MACOS_NO_ACCOUNT == 'true'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmg_paths=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ "${#dmg_paths[@]}" -ne 1 ]; then
            printf 'Expected exactly one macOS DMG, found %s\n' "${#dmg_paths[@]}"
            exit 1
          fi

          current_path="${dmg_paths[0]}"
          current_name="$(basename "$current_path")"
          current_dir="$(dirname "$current_path")"

          if [[ "$current_name" == *"_no-account_"* ]]; then
            printf 'No-account macOS DMG already labeled: %s\n' "$current_path"
            exit 0
          fi

          labeled_name="${current_name/_universal.dmg/_no-account_universal.dmg}"
          if [ "$labeled_name" = "$current_name" ]; then
            labeled_name="${current_name%.dmg}_no-account_macos.dmg"
          fi

          labeled_path="$current_dir/$labeled_name"
          mv "$current_path" "$labeled_path"
          rm -f "$current_path.sha256" "$labeled_path.sha256"
          printf 'Labeled no-account macOS DMG: %s\n' "$labeled_path"

      - name: Create macOS checksum
        if: matrix.platform == 'macos-26'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmg_paths=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ "${#dmg_paths[@]}" -ne 1 ]; then
            printf 'Expected exactly one macOS DMG, found %s\n' "${#dmg_paths[@]}"
            exit 1
          fi

          shasum -a 256 "${dmg_paths[0]}" > "${dmg_paths[0]}.sha256"
          cat "${dmg_paths[0]}.sha256"

      - name: Remove old macOS release assets
        if: startsWith(matrix.platform, 'macos')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            printf 'Deleting stale macOS release asset: %s\n' "$asset"
            gh release delete-asset "$RELEASE_TAG" "$asset" -y
          done < <(
            gh release view "$RELEASE_TAG" \
              --json assets \
              --jq '.assets[].name' \
              | grep -E '\.dmg(\.sha256)?$' || true
          )

      - name: Verify Windows MSI signature and checksum
        if: matrix.platform == 'windows-2025'
        shell: pwsh
        env:
          EXPECTED_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $msis = @(Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle/msi" -Filter "*.msi")
          if ($msis.Count -ne 1) {
            throw "Expected exactly one Windows MSI before release upload; found $($msis.Count)."
          }
          $msi = $msis[0]
          if ($msi.Name -notlike "*$env:EXPECTED_VERSION*") {
            throw "Windows MSI filename does not include release version $env:EXPECTED_VERSION."
          }
          $signature = Get-AuthenticodeSignature $msi.FullName
          if ($signature.Status -ne "Valid") {
            throw "Windows MSI is not Authenticode-signed. Configure certificateThumbprint and timestampUrl before public MSI upload."
          }
          $hash = Get-FileHash -Algorithm SHA256 $msi.FullName
          "$($hash.Hash.ToLowerInvariant())  $($msi.Name)" | Set-Content -NoNewline -Encoding ascii "$($msi.FullName).sha256"

      - name: Stage Windows release assets
        if: matrix.platform == 'windows-2025'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force "release-assets/public" | Out-Null
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi" "release-assets/public/"
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sha256" "release-assets/public/"

      - name: Stage macOS release assets
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets/public
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg release-assets/public/
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg.sha256 release-assets/public/

      - name: Verify Linux packages and checksums
        if: matrix.platform == 'ubuntu-24.04'
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          appimages=(src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage)
          debs=(src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb)

          if [ "${#appimages[@]}" -ne 1 ]; then
            printf 'Expected exactly one Linux AppImage before release upload; found %s\n' "${#appimages[@]}"
            exit 1
          fi
          if [ "${#debs[@]}" -ne 1 ]; then
            printf 'Expected exactly one Linux deb before release upload; found %s\n' "${#debs[@]}"
            exit 1
          fi

          for asset in "${appimages[0]}" "${debs[0]}"; do
            if [ ! -s "$asset" ]; then
              printf 'Linux asset is empty: %s\n' "$asset"
              exit 1
            fi
            if [[ "$(basename "$asset")" != *"$EXPECTED_VERSION"* ]]; then
              printf 'Linux asset filename does not include release version %s: %s\n' "$EXPECTED_VERSION" "$asset"
              exit 1
            fi
            sha256sum "$asset" > "$asset.sha256"
            cat "$asset.sha256"
          done

          file "${appimages[0]}"
          dpkg-deb --info "${debs[0]}" >/dev/null
          dpkg-deb --contents "${debs[0]}" >/dev/null

      - name: Stage Linux release assets
        if: matrix.platform == 'ubuntu-24.04'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets/public
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage release-assets/public/
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sha256 release-assets/public/
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb release-assets/public/
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb.sha256 release-assets/public/

      - name: Generate release SBOM
        shell: bash
        env:
          PLATFORM_KEY: ${{ matrix.platform_key }}
          RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          npm run release:sbom -- \
            --platform "$PLATFORM_KEY" \
            --version "$RELEASE_VERSION" \
            --out-dir release-assets/public \
            --checksums-out release-assets/attestation-subjects.sha256 \
            --require-artifacts

      - name: Attest release artifact provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: release-assets/public/*

      - name: Attest release artifact SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: release-assets/attestation-subjects.sha256
          sbom-path: release-assets/public/JobSentinel-${{ needs.create-release.outputs.version }}-${{ matrix.platform_key }}.sbom.spdx.json

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-assets/public/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            printf 'No release assets were staged for upload.\n'
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
