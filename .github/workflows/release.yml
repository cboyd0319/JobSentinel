name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: JobSentinel ${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false

  build-release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name_prefix: JobSentinel-Windows
            asset_path: src-tauri/target/release/bundle/msi/*.msi
          - platform: macos-latest
            target: universal-apple-darwin
            asset_name_prefix: JobSentinel-macOS
            asset_path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - platform: ubuntu-20.04
            target: x86_64-unknown-linux-gnu
            asset_name_prefix: JobSentinel-Linux
            asset_path_appimage: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            asset_path_deb: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Install Rust dependencies
        working-directory: ./src-tauri
        run: |
          if [ "${{ matrix.target }}" = "universal-apple-darwin" ]; then
            cargo fetch --target aarch64-apple-darwin
            cargo fetch --target x86_64-apple-darwin
          else
            cargo fetch --target ${{ matrix.target }}
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        working-directory: ./src-tauri
        run: |
          if [ "${{ matrix.target }}" = "universal-apple-darwin" ]; then
            cargo tauri build --target universal-apple-darwin
          else
            cargo tauri build --target ${{ matrix.target }}
          fi

      # Windows MSI upload
      - name: Upload Windows MSI
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ matrix.asset_path }}
          asset_name: ${{ matrix.asset_name_prefix }}-${{ needs.create-release.outputs.version }}.msi
          asset_content_type: application/x-msi

      # macOS DMG upload
      - name: Upload macOS DMG
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ matrix.asset_path }}
          asset_name: ${{ matrix.asset_name_prefix }}-${{ needs.create-release.outputs.version }}.dmg
          asset_content_type: application/x-apple-diskimage

      # Linux AppImage upload
      - name: Upload Linux AppImage
        if: matrix.platform == 'ubuntu-20.04'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ matrix.asset_path_appimage }}
          asset_name: ${{ matrix.asset_name_prefix }}-${{ needs.create-release.outputs.version }}.AppImage
          asset_content_type: application/vnd.appimage

      # Linux .deb upload
      - name: Upload Linux .deb
        if: matrix.platform == 'ubuntu-20.04'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ matrix.asset_path_deb }}
          asset_name: ${{ matrix.asset_name_prefix }}-${{ needs.create-release.outputs.version }}.deb
          asset_content_type: application/vnd.debian.binary-package
