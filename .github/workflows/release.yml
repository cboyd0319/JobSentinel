name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag, for example 2.9.0 or v2.9.0"
        required: true
        type: string
      platform:
        description: "Platform assets to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
  push:
    tags:
      - "v*"

permissions: {}

env:
  CARGO_INCREMENTAL: "0"
  SQLX_OFFLINE: true

jobs:
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev=2.52.3-0ubuntu0.24.04.1 \
            libgtk-3-dev=3.24.41-4ubuntu1.3 \
            libappindicator3-dev=12.10.1+20.10.20200706.1-0ubuntu5 \
            librsvg2-dev=2.58.0+dfsg-1build1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96.0"
          components: clippy, rustfmt

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: npm run release:check-version -- "$RELEASE_VERSION"

      - name: Run harness checks
        run: npm run harness:check

      - name: Check latest stable dependency pins
        run: npm run release:check-deps

      - name: Run harness script tests
        run: npm run test:scripts

      - name: Run markdown lint
        run: npm run lint:md

      - name: Run frontend build
        run: npm run build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --lib

  create-release:
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment:
      name: release
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
      matrix: ${{ steps.get_version.outputs.matrix }}
    steps:
      - name: Get release inputs
        id: get_version
        shell: bash
        env:
          INPUT_PLATFORM: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'all' }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          set -euo pipefail

          if [ -n "$INPUT_VERSION" ]; then
            version="${INPUT_VERSION#v}"
          else
            version="${GITHUB_REF#refs/tags/v}"
          fi

          case "$INPUT_PLATFORM" in
            all)
              matrix='[{"platform_key":"windows","platform":"windows-2025","target":"x86_64-pc-windows-msvc","asset_name_prefix":"JobSentinel-Windows"},{"platform_key":"macos","platform":"macos-26","target":"universal-apple-darwin","asset_name_prefix":"JobSentinel-macOS"},{"platform_key":"linux","platform":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","asset_name_prefix":"JobSentinel-Linux"}]'
              ;;
            windows)
              matrix='[{"platform_key":"windows","platform":"windows-2025","target":"x86_64-pc-windows-msvc","asset_name_prefix":"JobSentinel-Windows"}]'
              ;;
            macos)
              matrix='[{"platform_key":"macos","platform":"macos-26","target":"universal-apple-darwin","asset_name_prefix":"JobSentinel-macOS"}]'
              ;;
            linux)
              matrix='[{"platform_key":"linux","platform":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","asset_name_prefix":"JobSentinel-Linux"}]'
              ;;
            *)
              printf 'Unsupported release platform: %s\n' "$INPUT_PLATFORM"
              exit 1
              ;;
          esac

          {
            printf 'version=%s\n' "$version"
            printf 'tag=v%s\n' "$version"
            printf 'matrix=%s\n' "$matrix"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: JobSentinel ${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          body: |
            macOS package status is enforced by the release workflow.

            In no-Apple-Developer-account mode, the macOS DMG is ad-hoc signed, not Developer ID signed, not notarized, and not Gatekeeper-ready. It requires a first-open Privacy & Security approval on macOS. Verify the matching `.sha256` checksum before opening.

            When Developer ID signing and notarization are configured, the macOS workflow requires Gatekeeper acceptance before upload.

  build-release:
    needs: create-release
    environment:
      name: release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.create-release.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev=2.52.3-0ubuntu0.24.04.1 \
            libgtk-3-dev=3.24.41-4ubuntu1.3 \
            libappindicator3-dev=12.10.1+20.10.20200706.1-0ubuntu5 \
            librsvg2-dev=2.58.0+dfsg-1build1 \
            patchelf=0.18.0-1.1build1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Install frontend dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Configure macOS signing and notarization
        if: matrix.platform == 'macos-26'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          JOBSENTINEL_MACOS_NOTARY_PROFILE: ${{ secrets.JOBSENTINEL_MACOS_NOTARY_PROFILE }}
          NOTARYTOOL_KEYCHAIN_PROFILE: ${{ secrets.NOTARYTOOL_KEYCHAIN_PROFILE }}
        run: |
          set -euo pipefail

          signing_required=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_SIGNING_IDENTITY
          )
          signing_missing=()
          for name in "${signing_required[@]}"; do
            if [ -z "${!name:-}" ]; then
              signing_missing+=("$name")
            fi
          done

          apple_id_notary=false
          api_key_notary=false
          profile_notary=false
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            apple_id_notary=true
          fi
          if [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_KEY_PATH:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
            api_key_notary=true
          fi
          if [ -n "${JOBSENTINEL_MACOS_NOTARY_PROFILE:-}" ] || [ -n "${NOTARYTOOL_KEYCHAIN_PROFILE:-}" ]; then
            profile_notary=true
          fi

          notary_fields=(
            APPLE_ID
            APPLE_PASSWORD
            APPLE_TEAM_ID
            APPLE_API_KEY
            APPLE_API_KEY_PATH
            APPLE_API_ISSUER
          )
          any_notary_field=false
          for name in "${notary_fields[@]}"; do
            if [ -n "${!name:-}" ]; then
              any_notary_field=true
            fi
          done

          if [ "$profile_notary" = "true" ]; then
            printf 'GitHub macOS release runners cannot use a pre-existing notarytool keychain profile. Configure APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID or APPLE_API_KEY/APPLE_API_KEY_PATH/APPLE_API_ISSUER instead.\n'
            exit 1
          fi

          if [ "${#signing_missing[@]}" -ne 0 ]; then
            if [ "${#signing_missing[@]}" -eq "${#signing_required[@]}" ] && [ "$any_notary_field" = "false" ]; then
              printf 'Apple Developer release secrets are not configured. Building locally verified ad-hoc macOS DMG without notarization.\n'
              {
                printf 'JOBSENTINEL_MACOS_SIGNING_IDENTITY=-\n'
                printf 'JOBSENTINEL_MACOS_NOTARIZE_DMG=false\n'
                printf 'JOBSENTINEL_MACOS_REQUIRE_GATEKEEPER=false\n'
                printf 'JOBSENTINEL_MACOS_NO_ACCOUNT=true\n'
              } >> "$GITHUB_ENV"
              exit 0
            fi

            printf 'Partial macOS signing secrets are configured. Missing: %s\n' "${signing_missing[*]}"
            exit 1
          fi

          if [ "$apple_id_notary" != "true" ] && [ "$api_key_notary" != "true" ]; then
            printf 'macOS signing secrets are configured, but no complete notarization auth set is available. Configure APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID or APPLE_API_KEY/APPLE_API_KEY_PATH/APPLE_API_ISSUER.\n'
            exit 1
          fi

          keychain_password="$(openssl rand -hex 24)"
          printf '::add-mask::%s\n' "$keychain_password"
          keychain_path="$RUNNER_TEMP/jobsentinel-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/jobsentinel-certificate.p12"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

          if [ "$api_key_notary" = "true" ]; then
            materialized_api_key_path="$APPLE_API_KEY_PATH"
            if [ ! -f "$materialized_api_key_path" ]; then
              materialized_api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
              umask 077
              printf '%s' "$APPLE_API_KEY_PATH" > "$materialized_api_key_path"
              chmod 600 "$materialized_api_key_path"
            fi

            if [ ! -s "$materialized_api_key_path" ]; then
              printf 'APPLE_API_KEY_PATH must point to a readable .p8 file or contain the private key contents.\n'
              exit 1
            fi

            printf 'APPLE_API_KEY_PATH=%s\n' "$materialized_api_key_path" >> "$GITHUB_ENV"
          fi

          {
            printf 'APPLE_SIGNING_IDENTITY=%s\n' "$APPLE_SIGNING_IDENTITY"
            printf 'JOBSENTINEL_MACOS_SIGNING_IDENTITY=%s\n' "$APPLE_SIGNING_IDENTITY"
            printf 'JOBSENTINEL_MACOS_NOTARIZE_DMG=true\n'
            printf 'JOBSENTINEL_MACOS_REQUIRE_GATEKEEPER=true\n'
            printf 'JOBSENTINEL_MACOS_NO_ACCOUNT=false\n'
          } >> "$GITHUB_ENV"

      - name: Build Tauri app
        if: matrix.platform != 'macos-26'
        run: npx --no-install tauri build --target ${{ matrix.target }}

      - name: Build macOS app and DMG
        if: matrix.platform == 'macos-26'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run tauri:build:macos -- --target ${{ matrix.target }}

      - name: Verify macOS app and DMG
        if: matrix.platform == 'macos-26'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmg_paths=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ "${#dmg_paths[@]}" -ne 1 ]; then
            printf 'Expected exactly one macOS DMG, found %s\n' "${#dmg_paths[@]}"
            exit 1
          fi
          args=(
            --dmg "${dmg_paths[0]}"
            --expected-architectures "x86_64,arm64"
            --expected-bundle-id "com.jobsentinel.main"
            --expected-product-name "JobSentinel"
            --expected-version "${{ needs.create-release.outputs.version }}"
            --expected-icon-file "icon.icns"
            --expected-minimum-system-version "13.0"
            --launch-smoke
            --install-smoke
            --require-checksum
          )

          if [ "${JOBSENTINEL_MACOS_REQUIRE_GATEKEEPER:-false}" = "true" ]; then
            args+=(--require-gatekeeper)
          fi

          npm run tauri:verify:macos -- "${args[@]}"

      - name: Label no-account macOS DMG
        if: matrix.platform == 'macos-26' && env.JOBSENTINEL_MACOS_NO_ACCOUNT == 'true'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmg_paths=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ "${#dmg_paths[@]}" -ne 1 ]; then
            printf 'Expected exactly one macOS DMG, found %s\n' "${#dmg_paths[@]}"
            exit 1
          fi

          current_path="${dmg_paths[0]}"
          current_name="$(basename "$current_path")"
          current_dir="$(dirname "$current_path")"

          if [[ "$current_name" == *"_no-account_"* ]]; then
            printf 'No-account macOS DMG already labeled: %s\n' "$current_path"
            exit 0
          fi

          labeled_name="${current_name/_universal.dmg/_no-account_universal.dmg}"
          if [ "$labeled_name" = "$current_name" ]; then
            labeled_name="${current_name%.dmg}_no-account_macos.dmg"
          fi

          labeled_path="$current_dir/$labeled_name"
          mv "$current_path" "$labeled_path"
          rm -f "$current_path.sha256" "$labeled_path.sha256"
          printf 'Labeled no-account macOS DMG: %s\n' "$labeled_path"

      - name: Create macOS checksum
        if: matrix.platform == 'macos-26'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmg_paths=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ "${#dmg_paths[@]}" -ne 1 ]; then
            printf 'Expected exactly one macOS DMG, found %s\n' "${#dmg_paths[@]}"
            exit 1
          fi

          shasum -a 256 "${dmg_paths[0]}" > "${dmg_paths[0]}.sha256"
          cat "${dmg_paths[0]}.sha256"

      - name: Remove old macOS release assets
        if: startsWith(matrix.platform, 'macos')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            printf 'Deleting stale macOS release asset: %s\n' "$asset"
            gh release delete-asset "$RELEASE_TAG" "$asset" -y
          done < <(
            gh release view "$RELEASE_TAG" \
              --json assets \
              --jq '.assets[].name' \
              | grep -E '\.dmg(\.sha256)?$' || true
          )

      # Windows MSI upload
      - name: Verify Windows MSI signature and checksum
        if: matrix.platform == 'windows-2025'
        shell: pwsh
        env:
          EXPECTED_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $msis = @(Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle/msi" -Filter "*.msi")
          if ($msis.Count -ne 1) {
            throw "Expected exactly one Windows MSI before release upload; found $($msis.Count)."
          }
          $msi = $msis[0]
          if ($msi.Name -notlike "*$env:EXPECTED_VERSION*") {
            throw "Windows MSI filename does not include release version $env:EXPECTED_VERSION."
          }
          $signature = Get-AuthenticodeSignature $msi.FullName
          if ($signature.Status -ne "Valid") {
            throw "Windows MSI is not Authenticode-signed. Configure certificateThumbprint and timestampUrl before public MSI upload."
          }
          $hash = Get-FileHash -Algorithm SHA256 $msi.FullName
          "$($hash.Hash.ToLowerInvariant())  $($msi.Name)" | Set-Content -NoNewline -Encoding ascii "$($msi.FullName).sha256"

      - name: Upload Windows MSI
        if: matrix.platform == 'windows-2025'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sha256

      # macOS DMG upload
      - name: Upload macOS DMG
        if: startsWith(matrix.platform, 'macos')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg.sha256

      # Linux uploads
      - name: Verify Linux packages and checksums
        if: matrix.platform == 'ubuntu-24.04'
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          appimages=(src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage)
          debs=(src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb)

          if [ "${#appimages[@]}" -ne 1 ]; then
            printf 'Expected exactly one Linux AppImage before release upload; found %s\n' "${#appimages[@]}"
            exit 1
          fi
          if [ "${#debs[@]}" -ne 1 ]; then
            printf 'Expected exactly one Linux deb before release upload; found %s\n' "${#debs[@]}"
            exit 1
          fi

          for asset in "${appimages[0]}" "${debs[0]}"; do
            if [ ! -s "$asset" ]; then
              printf 'Linux asset is empty: %s\n' "$asset"
              exit 1
            fi
            if [[ "$(basename "$asset")" != *"$EXPECTED_VERSION"* ]]; then
              printf 'Linux asset filename does not include release version %s: %s\n' "$EXPECTED_VERSION" "$asset"
              exit 1
            fi
            sha256sum "$asset" > "$asset.sha256"
            cat "$asset.sha256"
          done

          file "${appimages[0]}"
          dpkg-deb --info "${debs[0]}" >/dev/null
          dpkg-deb --contents "${debs[0]}" >/dev/null

      - name: Upload Linux AppImage
        if: matrix.platform == 'ubuntu-24.04'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          files: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sha256
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb.sha256
