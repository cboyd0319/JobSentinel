name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag, for example X.Y.Z or vX.Y.Z"
        required: true
        type: string
      platform:
        description: "Platform assets to build. Use windows-linux only after macOS was built and uploaded locally."
        required: true
        default: all
        type: choice
        options:
          - all
          - windows-linux
          - windows
          - macos
          - linux

permissions: {}

env:
  CARGO_INCREMENTAL: "0"
  SQLX_OFFLINE: true

jobs:
  release-inputs:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release_inputs.outputs.version }}
      tag: ${{ steps.release_inputs.outputs.tag }}
      matrix: ${{ steps.release_inputs.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/harness/npm-pin.mjs

      - name: Resolve release inputs
        id: release_inputs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PLATFORM: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'all' }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          set -euo pipefail
          event="${EVENT_NAME:-}"

          if [ -n "$INPUT_VERSION" ]; then
            version="${INPUT_VERSION#v}"
          else
            version="${GITHUB_REF#refs/tags/v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'Release version must be an exact stable semver (x.y.z), found: %s\n' "$version"
            exit 1
          fi

          expected_ref="refs/tags/v${version}"
          if [ "${GITHUB_REF:-}" != "$expected_ref" ]; then
            if [ "$event" = "workflow_dispatch" ]; then
              printf 'Manual release dispatch must run from %s. Select the existing release tag as the workflow ref. Found: %s\n' "$expected_ref" "${GITHUB_REF:-<unset>}"
            else
              printf 'Release workflow must run from %s. Found: %s\n' "$expected_ref" "${GITHUB_REF:-<unset>}"
            fi
            exit 1
          fi

          case "$INPUT_PLATFORM" in
            all)
              matrix='[{"platform_key":"windows","platform":"windows-2025","target":"x86_64-pc-windows-msvc","asset_name_prefix":"JobSentinel-Windows"},{"platform_key":"macos","platform":"macos-26","target":"universal-apple-darwin","asset_name_prefix":"JobSentinel-macOS"},{"platform_key":"linux","platform":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","asset_name_prefix":"JobSentinel-Linux"}]'
              ;;
            windows-linux)
              matrix='[{"platform_key":"windows","platform":"windows-2025","target":"x86_64-pc-windows-msvc","asset_name_prefix":"JobSentinel-Windows"},{"platform_key":"linux","platform":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","asset_name_prefix":"JobSentinel-Linux"}]'
              ;;
            windows)
              matrix='[{"platform_key":"windows","platform":"windows-2025","target":"x86_64-pc-windows-msvc","asset_name_prefix":"JobSentinel-Windows"}]'
              ;;
            macos)
              matrix='[{"platform_key":"macos","platform":"macos-26","target":"universal-apple-darwin","asset_name_prefix":"JobSentinel-macOS"}]'
              ;;
            linux)
              matrix='[{"platform_key":"linux","platform":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","asset_name_prefix":"JobSentinel-Linux"}]'
              ;;
            *)
              printf 'Unsupported release platform: %s\n' "$INPUT_PLATFORM"
              exit 1
              ;;
          esac

          {
            printf 'version=%s\n' "$version"
            printf 'tag=v%s\n' "$version"
            printf 'matrix=%s\n' "$matrix"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ steps.release_inputs.outputs.version }}
        run: npm run release:check-version -- "$RELEASE_VERSION"

  preflight-harness:
    needs: release-inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 18
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/harness/npm-pin.mjs

      - name: Run release readiness checks
        env:
          RELEASE_VERSION: ${{ needs.release-inputs.outputs.version }}
        run: npm run release:readiness -- --version "$RELEASE_VERSION"

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Run harness checks
        run: npm run harness:check

      - name: Run environment doctor
        run: npm run doctor -- --skip-native

      - name: Check latest stable dependency pins
        run: npm run release:check-deps

      - name: Run harness script tests
        run: npm run test:scripts

      - name: Run markdown lint
        run: npm run lint:md

      - name: Install pinned Vale
        env:
          VALE_ARCHIVE_SHA256: "c024d9c157874fb043d4f24a055d60050d1bb18755251f590593eed5bace1857"
          VALE_VERSION: "3.15.1"
        run: |
          archive="$RUNNER_TEMP/vale.tar.gz"
          bin_dir="$RUNNER_TEMP/vale-bin"
          curl --fail --location --silent --show-error \
            "https://github.com/vale-cli/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" \
            --output "$archive"
          echo "${VALE_ARCHIVE_SHA256}  ${archive}" | sha256sum --check -
          mkdir -p "$bin_dir"
          tar --extract --gzip --file "$archive" --directory "$bin_dir" vale
          echo "$bin_dir" >> "$GITHUB_PATH"
          "$bin_dir/vale" --version

      - name: Run prose lint
        run: npm run lint:prose

  preflight-frontend:
    needs: release-inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/harness/npm-pin.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend unit tests
        run: npm test -- --run

      - name: Run frontend build
        run: npm run build

      - name: Install Playwright Chromium
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Check end-to-end readiness
        run: npm run doctor:e2e -- --skip-native

      - name: Run complete end-to-end suite
        run: npm run test:e2e:all

  preflight-rust:
    needs: release-inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/harness/npm-pin.mjs

      - name: Install Node dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: "1.97.1"
          components: clippy, rustfmt

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            file=1:5.45-3build1 \
            libwebkit2gtk-4.1-dev=2.52.3-0ubuntu0.24.04.1 \
            libgtk-3-dev=3.24.41-4ubuntu1.3 \
            libgtk-3-bin=3.24.41-4ubuntu1.3 \
            libappindicator3-dev=12.10.1+20.10.20200706.1-0ubuntu5 \
            librsvg2-dev=2.58.0+dfsg-1build1

      - name: Run Rust clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Check SQLx offline metadata
        run: npm run lint:sqlx

  preflight-security-node:
    needs: release-inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/harness/npm-pin.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Run security sensors
        run: npm run lint:security

      - name: Run GitHub Actions static analysis
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          advanced-security: false
          inputs: .github/workflows

      - name: npm audit
        run: npm audit --audit-level=moderate

  preflight-security-rust:
    needs: release-inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: "1.97.1"

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.20.2 --locked

      - name: cargo deny supply-chain policy
        run: cargo deny check advisories bans licenses sources

  stage-release:
    needs:
      - release-inputs
      - preflight-harness
      - preflight-frontend
      - preflight-rust
      - preflight-security-node
      - preflight-security-rust
    permissions:
      attestations: write
      contents: write
      id-token: write
    uses: ./.github/workflows/release-stage.yml
    with:
      matrix: ${{ needs.release-inputs.outputs.matrix }}
      tag: ${{ needs.release-inputs.outputs.tag }}
      version: ${{ needs.release-inputs.outputs.version }}

  build-release:
    needs:
      - release-inputs
      - stage-release
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.release-inputs.outputs.matrix) }}
    uses: ./.github/workflows/release-build.yml
    with:
      platform_key: ${{ matrix.platform_key }}
      tag: ${{ needs.release-inputs.outputs.tag }}
      version: ${{ needs.release-inputs.outputs.version }}

  publish-release:
    needs:
      - release-inputs
      - build-release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment:
      name: release
    permissions:
      contents: write
    steps:
      - name: Publish hosted release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.release-inputs.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release-inputs.outputs.version }}
        run: |
          set -euo pipefail

          gh release edit "$RELEASE_TAG" \
            --title "JobSentinel $RELEASE_VERSION" \
            --draft=false \
            --prerelease=false
