name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  SQLX_OFFLINE: true

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        run: npm run release:check-version -- "${GITHUB_REF_NAME}"

      - name: Run harness checks
        run: npm run harness:check

      - name: Run harness script tests
        run: npm run test:scripts

      - name: Run markdown lint
        run: npm run lint:md

      - name: Run frontend build
        run: npm run build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --lib

  create-release:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: JobSentinel ${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          body: |
            macOS package status is enforced by the release workflow.

            In no-Apple-Developer-account mode, the macOS DMG is ad-hoc signed, not Developer ID signed, not notarized, and not Gatekeeper-ready. It requires a first-open Privacy & Security approval on macOS. Verify the matching `.sha256` checksum before opening.

            When Developer ID signing and notarization are configured, the macOS workflow requires Gatekeeper acceptance before upload.

  build-release:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name_prefix: JobSentinel-Windows
          - platform: macos-latest
            target: universal-apple-darwin
            asset_name_prefix: JobSentinel-macOS
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name_prefix: JobSentinel-Linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Configure macOS signing and notarization
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          required=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_SIGNING_IDENTITY
            APPLE_ID
            APPLE_PASSWORD
            APPLE_TEAM_ID
          )
          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -ne 0 ]; then
            if [ "${#missing[@]}" -eq "${#required[@]}" ]; then
              printf 'Apple Developer release secrets are not configured. Building locally verified ad-hoc macOS DMG without notarization.\n'
              {
                printf 'JOBSENTINEL_MACOS_SIGNING_IDENTITY=-\n'
                printf 'JOBSENTINEL_MACOS_NOTARIZE_DMG=false\n'
                printf 'JOBSENTINEL_MACOS_REQUIRE_GATEKEEPER=false\n'
              } >> "$GITHUB_ENV"
              exit 0
            fi

            printf 'Partial macOS release secrets are configured. Missing: %s\n' "${missing[*]}"
            exit 1
          fi

          keychain_password="$(openssl rand -hex 24)"
          keychain_path="$RUNNER_TEMP/jobsentinel-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/jobsentinel-certificate.p12"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

          {
            printf 'APPLE_SIGNING_IDENTITY=%s\n' "$APPLE_SIGNING_IDENTITY"
            printf 'JOBSENTINEL_MACOS_SIGNING_IDENTITY=%s\n' "$APPLE_SIGNING_IDENTITY"
            printf 'APPLE_ID=%s\n' "$APPLE_ID"
            printf 'APPLE_PASSWORD=%s\n' "$APPLE_PASSWORD"
            printf 'APPLE_TEAM_ID=%s\n' "$APPLE_TEAM_ID"
            printf 'JOBSENTINEL_MACOS_NOTARIZE_DMG=true\n'
            printf 'JOBSENTINEL_MACOS_REQUIRE_GATEKEEPER=true\n'
          } >> "$GITHUB_ENV"

      - name: Build Tauri app
        if: matrix.platform != 'macos-latest'
        run: npx tauri build --target ${{ matrix.target }}

      - name: Build macOS app and DMG
        if: matrix.platform == 'macos-latest'
        run: npm run tauri:build:macos -- --target ${{ matrix.target }}

      - name: Verify macOS app and DMG
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmg_paths=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ "${#dmg_paths[@]}" -ne 1 ]; then
            printf 'Expected exactly one macOS DMG, found %s\n' "${#dmg_paths[@]}"
            exit 1
          fi
          args=(
            --dmg "${dmg_paths[0]}"
            --expected-architectures "x86_64,arm64"
            --expected-bundle-id "com.jobsentinel.main"
            --expected-product-name "JobSentinel"
            --expected-version "${{ needs.create-release.outputs.version }}"
            --expected-icon-file "icon.icns"
            --expected-minimum-system-version "13.0"
            --launch-smoke
            --install-smoke
          )

          if [ "${JOBSENTINEL_MACOS_REQUIRE_GATEKEEPER:-false}" = "true" ]; then
            args+=(--require-gatekeeper)
          fi

          npm run tauri:verify:macos -- "${args[@]}"

      - name: Create macOS checksum
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmg_paths=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ "${#dmg_paths[@]}" -ne 1 ]; then
            printf 'Expected exactly one macOS DMG, found %s\n' "${#dmg_paths[@]}"
            exit 1
          fi

          shasum -a 256 "${dmg_paths[0]}" > "${dmg_paths[0]}.sha256"
          cat "${dmg_paths[0]}.sha256"

      # Windows MSI upload
      - name: Upload Windows MSI
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      # macOS DMG upload
      - name: Upload macOS DMG
        if: startsWith(matrix.platform, 'macos')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg.sha256

      # Linux uploads
      - name: Upload Linux AppImage
        if: matrix.platform == 'ubuntu-latest'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
