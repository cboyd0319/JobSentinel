name: Release staging

on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string
      tag:
        required: true
        type: string
      version:
        required: true
        type: string

permissions: {}

jobs:
  create-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment:
      name: release
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release_inputs.outputs.version }}
      tag: ${{ steps.release_inputs.outputs.tag }}
      matrix: ${{ steps.release_inputs.outputs.matrix }}
    steps:
      - name: Publish release inputs
        id: release_inputs
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_MATRIX: ${{ inputs.matrix }}
        run: |
          set -euo pipefail
          {
            printf 'version=%s\n' "$RELEASE_VERSION"
            printf 'tag=%s\n' "$RELEASE_TAG"
            printf 'matrix=%s\n' "$RELEASE_MATRIX"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create staged release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_inputs.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release_inputs.outputs.version }}
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          release_notes_path="docs/releases/v${RELEASE_VERSION}.md"

          if [ -s "$release_notes_path" ]; then
            cat "$release_notes_path" > "$notes_file"
            cat >> "$notes_file" <<'EOF'

          ## Package Status

          macOS package status is enforced by the release workflow.

          In no-Apple-Developer-account mode, the macOS DMG is ad-hoc signed, not Developer ID signed, not notarized, and not Gatekeeper-ready. It requires a first-open Privacy & Security approval on macOS. Verify the matching `.sha256` checksum before opening.

          When Developer ID signing and notarization are configured, the macOS workflow requires Gatekeeper acceptance before upload.
          EOF
          else
            cat > "$notes_file" <<'EOF'
          macOS package status is enforced by the release workflow.

          In no-Apple-Developer-account mode, the macOS DMG is ad-hoc signed, not Developer ID signed, not notarized, and not Gatekeeper-ready. It requires a first-open Privacy & Security approval on macOS. Verify the matching `.sha256` checksum before opening.

          When Developer ID signing and notarization are configured, the macOS workflow requires Gatekeeper acceptance before upload.
          EOF
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "JobSentinel $RELEASE_VERSION" \
              --draft \
              --prerelease=false \
              --notes-file "$notes_file"
          else
            gh release create "$RELEASE_TAG" \
              --title "JobSentinel $RELEASE_VERSION" \
              --draft \
              --verify-tag \
              --notes-file "$notes_file"
          fi

  package-agent-skills:
    needs: create-release
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    environment:
      name: release
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/harness/npm-pin.mjs

      - name: Package Agent Skills
        env:
          RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
        run: npm run release:skills -- --version "$RELEASE_VERSION" --out-dir release-assets/public

      - name: Attest Agent Skills tarball provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: release-assets/public/JobSentinel-${{ needs.create-release.outputs.version }}-agent-skills.tar.gz

      - name: Attest Agent Skills ZIP provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: release-assets/public/JobSentinel-${{ needs.create-release.outputs.version }}-agent-skills.zip

      - name: Upload Agent Skills archives
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail

          assets=(
            "release-assets/public/JobSentinel-$RELEASE_VERSION-agent-skills.tar.gz"
            "release-assets/public/JobSentinel-$RELEASE_VERSION-agent-skills.tar.gz.sha256"
            "release-assets/public/JobSentinel-$RELEASE_VERSION-agent-skills.zip"
            "release-assets/public/JobSentinel-$RELEASE_VERSION-agent-skills.zip.sha256"
          )

          for asset in "${assets[@]}"; do
            if [ ! -s "$asset" ]; then
              printf 'Expected Agent Skills archive or checksum before upload: %s\n' "$asset"
              exit 1
            fi
          done

          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
