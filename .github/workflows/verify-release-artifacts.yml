name: Verify Release Artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to verify. Leave blank to verify the latest public release.
        required: false
        type: string
      require_gatekeeper:
        description: Require Gatekeeper acceptance. Use only for Developer ID signed and notarized macOS releases.
        required: false
        default: false
        type: boolean
      platforms:
        description: Comma-separated public platforms to verify.
        required: false
        default: windows,macos,linux
        type: string
      require_windows_unsigned_label:
        description: Require Windows installer filenames to include _unsigned for no-account releases.
        required: false
        default: true
        type: boolean

permissions: {}

jobs:
  verify-public-release-assets:
    name: Verify public release assets
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      attestations: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/install-pinned-npm.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Verify public release asset set
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
          DISPATCH_PLATFORMS: ${{ inputs.platforms }}
          DISPATCH_REQUIRE_WINDOWS_UNSIGNED_LABEL: ${{ inputs.require_windows_unsigned_label }}
          VAR_REQUIRE_WINDOWS_UNSIGNED_LABEL: ${{ vars.JOBSENTINEL_WINDOWS_REQUIRE_UNSIGNED_LABEL }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          args=(--require-supply-chain)
          release_tag="${RELEASE_TAG:-${DISPATCH_TAG:-}}"
          if [ -n "$release_tag" ]; then
            args+=(--tag "$release_tag")
          fi

          platforms="${DISPATCH_PLATFORMS:-windows,macos,linux}"
          args+=(--platforms "$platforms")

          require_windows_unsigned_label="${VAR_REQUIRE_WINDOWS_UNSIGNED_LABEL:-true}"
          if [ -n "${DISPATCH_REQUIRE_WINDOWS_UNSIGNED_LABEL:-}" ]; then
            require_windows_unsigned_label="$DISPATCH_REQUIRE_WINDOWS_UNSIGNED_LABEL"
          fi
          if [ "$require_windows_unsigned_label" = "true" ]; then
            args+=(--require-windows-unsigned-label)
          fi

          npm run release:verify:public -- "${args[@]}"

  verify-macos-public-artifact:
    name: Verify public macOS DMG
    if: ${{ github.event_name == 'release' || contains(format(',{0},', inputs.platforms), ',macos,') }}
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      attestations: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Install pinned npm
        run: node scripts/install-pinned-npm.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit --no-fund

      - name: Verify public macOS release artifact
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
          REQUIRE_GATEKEEPER: ${{ inputs.require_gatekeeper || vars.JOBSENTINEL_MACOS_REQUIRE_GATEKEEPER || 'false' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          args=()
          release_tag="${RELEASE_TAG:-${DISPATCH_TAG:-}}"
          if [ -n "$release_tag" ]; then
            args+=(--tag "$release_tag")
          fi
          if [ "${REQUIRE_GATEKEEPER:-false}" = "true" ]; then
            args+=(--require-gatekeeper)
          fi
          args+=(--require-supply-chain)

          npm run tauri:verify:macos:latest -- "${args[@]}"
