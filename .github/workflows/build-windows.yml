name: Build Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 2.5.1)'
        required: true
        type: string

permissions:
  contents: read

env:
  SQLX_OFFLINE: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Validate requested version
        run: npm run release:check-version -- "${{ github.event.inputs.version }}"

      - name: Run harness checks
        run: npm run harness:check

      - name: Run harness script tests
        run: npm run test:scripts

      - name: Run markdown lint
        run: npm run lint:md

      - name: Run frontend build
        run: npm run build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload to Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: src-tauri/target/release/bundle/msi/*.msi
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
