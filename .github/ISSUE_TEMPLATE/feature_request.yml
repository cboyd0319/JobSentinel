name: Feature Request
description: Suggest an improvement or new feature
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Share the idea without private job-search details.

        **Important:** Please don't include personal information like:
        - Specific job titles you're searching for
        - Company names from your search
        - Your location or salary preferences
        - Resume text, notes, or application history

        JobSentinel can create a safe support report that redacts known
        sensitive details before you share it. Open Settings and click
        Copy Safe Support Report only if a report would help explain the idea.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point
      placeholder: "I often find myself needing to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe your proposed solution
      description: What would you like to see?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches you've thought about?
