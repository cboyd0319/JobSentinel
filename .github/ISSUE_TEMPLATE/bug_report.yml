name: Report a Problem
description: Something isn't working right
title: "[Problem]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        **Important:** Please don't include any personal information like:
        - Specific job titles you're searching for
        - Company names from your search
        - Your location or salary preferences

        JobSentinel can create a safe support report that redacts known
        sensitive details before you review and share it.

        Open Settings and click Copy Safe Support Report. If an error screen is
        open, click Copy Safe Support Report there. Paste that report below
        only if you want help.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what went wrong
      placeholder: "When I clicked X, I expected Y but got Z instead"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make this happen?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error

  - type: textarea
    id: safe-support-report
    attributes:
      label: Safe support report
      description: Paste the safe support report from JobSentinel only if you want help.
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots (make sure they don't show personal info!)

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - macOS 26 (Tahoe)
        - macOS 15 (Sequoia)
        - macOS 14 (Sonoma)
        - Linux (Ubuntu)
        - Linux (Fedora)
        - Linux (Arch)
        - Linux (Other)
    validations:
      required: true
