name: Question
description: Ask a question about using JobSentinel
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Ask the question without private job-search details.

        **Important:** Please don't include personal information like:
        - Specific job titles you're searching for
        - Company names from your search
        - Your location or salary preferences
        - Resume text, notes, or application history

        JobSentinel can create a safe support report that redacts known
        sensitive details before you review and share it. Open Settings and click
        Copy Safe Support Report only if a report would help explain the
        question.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any relevant background
