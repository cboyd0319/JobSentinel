name: Job Source Issue
description: Report job source results that look wrong
title: "[Source]: "
labels: ["scraper", "bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a job source issue.

        **Important:** Please don't include any personal information like specific
        job titles, company names, or location details from your search.

        JobSentinel can create a safe support report that redacts sensitive
        details before you share it. Open Settings and click Copy Safe Support
        Report, then paste that report below only if you want help.

  - type: dropdown
    id: scraper
    attributes:
      label: Affected job source
      description: Which job source is affected?
      options:
        - BuiltIn
        - Dice
        - Glassdoor
        - Greenhouse
        - HN Who's Hiring
        - JobsWithGPT
        - Lever
        - LinkedIn
        - Remote OK
        - SimplyHired
        - USAJobs
        - We Work Remotely
        - YC Startup Jobs
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      description: What kind of problem are you seeing?
      options:
        - No jobs appear
        - Some job details are missing
        - The source check crashes or shows an error
        - Job details look wrong
        - Duplicate jobs appear
        - The site is blocking checks
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what's wrong
      placeholder: "When I checked this source, I expected Y but got Z instead"
    validations:
      required: true

  - type: textarea
    id: example-url
    attributes:
      label: Example job link
      description: If applicable, provide a link to a public job posting that demonstrates the issue. Make sure it does not contain personal info.
      placeholder: "https://example.com/jobs/..."

  - type: textarea
    id: health-dashboard
    attributes:
      label: Job source health details
      description: If available, paste the source health details from JobSentinel.
      render: text

  - type: textarea
    id: debug-info
    attributes:
      label: Safe support report
      description: Paste the safe support report from JobSentinel only if you want help.
      render: text

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - macOS 26 (Tahoe)
        - macOS 15 (Sequoia)
        - macOS 14 (Sonoma)
        - Linux (Ubuntu)
        - Linux (Fedora)
        - Linux (Arch)
        - Linux (Other)
    validations:
      required: true
